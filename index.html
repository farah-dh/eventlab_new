<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23FF385C'/><text x='16' y='22' font-family='Arial' font-size='20' font-weight='bold' fill='white' text-anchor='middle'>E</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventLab</title>
  <link rel="stylesheet" type="text/css" href="/loader.css" />
</head>
<body>
  <div id="app">
    <div id="loading-bg">
      <div class="loading-logo">
        <div style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#FF385C,#FC642D);display:flex;align-items:center;justify-content:center;color:white;font-family:Arial,sans-serif;font-size:32px;font-weight:900;">E</div>
      </div>
      <div class="loading">
        <div class="effect-1 effects"></div>
        <div class="effect-2 effects"></div>
        <div class="effect-3 effects"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    const loaderColor = localStorage.getItem('vuexy-initial-loader-bg') || '#FFFFFF'
    const primaryColor = localStorage.getItem('vuexy-initial-loader-color') || '#FF385C'
    if (loaderColor)
      document.documentElement.style.setProperty('--initial-loader-bg', loaderColor)
    if (primaryColor)
      document.documentElement.style.setProperty('--initial-loader-color', primaryColor)
  </script>
</body>
</html>
